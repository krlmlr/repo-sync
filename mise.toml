[tools]
python = "3.11"

[tasks.fetch-inventory]
description = "Fetch branch list from krlmlr/actions-sync and write repos.yml"
run = "python3 scripts/fetch_inventory.py"

# Prerequisite: gh must be authenticated (`gh auth login`) before running clone.
[tasks.clone]
description = "Clone or update every repo in repos.yml into mirrors/<org>/<repo>/"
run = "bash scripts/clone.sh"
